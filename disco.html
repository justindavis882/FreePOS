    <style>
        :root {
            --bg: #1a1a1a; 
            --text: #fff;
            --border: #000;
            --panel: #fff;
        }
        
        body {
            margin: 0; 
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg); 
            color: var(--text);
            display: flex; 
            flex-direction: column; 
            justify-content: center;

            animation: colorHustle 2.5s infinite alternate;

            border-radius: 50px;

            color: var(--border);

            font-weight: bold;

            cursor: pointer; 
            transition: all 0.05s ease-in-out; 
            text-transform: uppercase; 
            padding: 15px 30px; 
            border-radius: 20px;
            margin-top: 40px;
        }

        .btn:active { 
            box-shadow: 0px 0px 0px var(--border); 
            transform: translate(8px, 8px); 
        }

        @keyframes spin { 
            100% { transform: rotate(360deg); } 
        }
        
        @keyframes boogie { 
            0% { transform: translateY(0px) rotate(-15deg) scale(1); } 
            100% { transform: translateY(-30px) rotate(15deg) scale(1.2); } 
        }
        
        @keyframes colorHustle {
            0% { background-color: #ff00ff; }
            25% { background-color: #00ffff; }
            50% { background-color: #ffff00; }
            75% { background-color: #ff4747; }
            100% { background-color: #4ade80; }
        }

        .dance-floor {
            display: flex; 
            justify-content: center; 
            gap: 40px; 
            margin-top: 40px; 
            font-size: 5rem;
        }

        .dancer-1 { animation: boogie 0.8s ease-in-out infinite alternate; }
        .dancer-2 { animation: boogie 0.9s ease-in-out infinite alternate-reverse; }
        .dancer-3 { animation: boogie 0.85s ease-in-out infinite alternate; }
    </style>
